name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (types)
        run: mypy src

      - name: Pytest (with coverage)
        run: pytest --cov=shipready --cov-report=term-missing

  smoke-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: CLI dry-run smoke test (no API key needed)
        run: |
          shipready validate --workbook examples/research_assistant.yaml
          shipready cases --workbook examples/research_assistant.yaml --no-color
          shipready grade --workbook examples/research_assistant.yaml --case t1 \
            --output-file examples/sample_outputs/research_assistant_t1_good.txt --dry-run
